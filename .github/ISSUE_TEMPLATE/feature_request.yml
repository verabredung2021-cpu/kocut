name: Feature request
description: Suggest a new KoCut feature or workflow improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What editing workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Korean subtitles
        - Silence detection
        - Filler-word detection
        - Retake detection
        - Shorts candidate detection
        - SRT export
        - EDL export
        - FCPXML export
        - GUI
        - CLI
        - Documentation
        - Security
        - Other
